name: Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Release notes (use \n for newlines)
        type: string
        required: false
      docker_private:
        description: 'Test build: push to private Docker repo (08shiro80/komga-private) only, skip tag and GitHub Release'
        default: false
        type: boolean
      docker_testing:
        description: 'Throwaway smoke build: push to 08shiro80/testing:latest only, skip everything else'
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6

      - name: Compute versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KOMGA_VER=$(grep '^baseVersion=' gradle.properties | cut -d= -f2)
          FORK_VER=$(grep '^forkVersion=' gradle.properties | cut -d= -f2)
          CURRENT=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "0.0.0")
          NEXT="${KOMGA_VER}-fork-${FORK_VER}"
          echo "version_current=$CURRENT" >> $GITHUB_OUTPUT
          echo "version_next=$NEXT" >> $GITHUB_OUTPUT
          echo "Previous version: $CURRENT"
          echo "New version: $NEXT"

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: komga-webui/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          java-package: 'jdk'
          distribution: 'temurin'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Cache built komga JAR
        id: cache_jar
        uses: actions/cache@v4
        with:
          path: komga/build/libs/
          key: komga-jar-${{ steps.versions.outputs.version_next }}-${{ hashFiles('komga/src/**', 'komga-webui/src/**', 'komga-webui/package-lock.json', '**/build.gradle.kts', 'settings.gradle', 'gradle.properties', 'plugins/**/build.gradle.kts', 'plugins/**/src/**') }}

      - name: Setup Gradle
        if: steps.cache_jar.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        if: steps.cache_jar.outputs.cache-hit != 'true'
        run: ./gradlew :komga:prepareThymeLeaf :komga:bootJar
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Create tag via API (verified)
        if: ${{ !inputs.docker_private && !inputs.docker_testing }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          VERSION="${{ steps.versions.outputs.version_next }}"

          # Delete existing tag if present
          gh api repos/${{ github.repository }}/git/refs/tags/${VERSION} -X DELETE 2>/dev/null || true

          # Get the latest commit SHA
          COMMIT_SHA=$(gh api repos/${{ github.repository }}/commits/${{ github.ref_name }} --jq '.sha')

          # Create the tag object
          TAG_SHA=$(gh api repos/${{ github.repository }}/git/tags \
            -X POST \
            -f tag="${VERSION}" \
            -f message="Release ${VERSION}" \
            -f object="$COMMIT_SHA" \
            -f type="commit" \
            --jq '.sha')

          # Create the tag reference
          gh api repos/${{ github.repository }}/git/refs \
            -X POST \
            -f ref="refs/tags/${VERSION}" \
            -f sha="$TAG_SHA"

      - name: Create GitHub Release
        if: ${{ !inputs.docker_private && !inputs.docker_testing }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.versions.outputs.version_next }}
          name: Release ${{ steps.versions.outputs.version_next }}
          body: |
            ${{ inputs.release_notes }}

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.versions.outputs.version_current }}...${{ steps.versions.outputs.version_next }}
          files: |
            komga/build/libs/komga-${{ steps.versions.outputs.version_next }}.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker build
        run: |
          JAR_NAME="komga-${{ steps.versions.outputs.version_next }}.jar"
          mkdir -p docker-build/assembly
          cp "komga/build/libs/${JAR_NAME}" docker-build/assembly/
          cp "komga/docker/entrypoint.sh" docker-build/
          sed "s/{{distributionArtifactFile}}/${JAR_NAME}/g" komga/docker/Dockerfile.tpl > docker-build/Dockerfile

      - name: Compute Docker tags
        id: docker_tags
        run: |
          VER="${{ steps.versions.outputs.version_next }}"
          if [ "${{ inputs.docker_testing }}" = "true" ]; then
            TAGS="sfai05/komga:testing"
          elif [ "${{ inputs.docker_private }}" = "true" ]; then
            TAGS="sfai05/komga:private
          sfai05/komga:private-${VER}"
          else
            TAGS="sfai05/komga:latest
          sfai05/komga:${VER}"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        with:
          context: docker-build
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GALLERY_DL_REV=${{ github.run_id }}-${{ github.run_attempt }}
          cache-from: type=gha,scope=komga-docker
          cache-to: type=gha,scope=komga-docker,mode=max
          tags: ${{ steps.docker_tags.outputs.tags }}
